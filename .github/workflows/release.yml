name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build skills zip
        run: zip -r "gambit-skills-${{ github.ref_name }}.zip" skills/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: gambit-skills-${{ github.ref_name }}.zip
